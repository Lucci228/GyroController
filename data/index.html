<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tilt Game</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #050a0e;
    --panel:   #0b1520;
    --border:  #0ff3;
    --cyan:    #00f5ff;
    --green:   #00ff88;
    --yellow:  #ffe600;
    --red:     #ff4060;
    --dim:     #1a2a3a;
    --text:    #c8eaf5;
    --cell:    32px;
    --gap:     4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
    overflow: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,245,255,.025) 3px,
      rgba(0,245,255,.025) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 5vw, 2.6rem);
    font-weight: 900;
    letter-spacing: 0.18em;
    color: var(--cyan);
    text-shadow: 0 0 18px var(--cyan), 0 0 40px #00f5ff66;
    margin-bottom: 4px;
    animation: flickerTitle 6s infinite;
  }
  @keyframes flickerTitle {
    0%,95%,100% { opacity:1; }
    96%          { opacity:.7; }
    97%          { opacity:1; }
    98%          { opacity:.6; }
  }

  .subtitle {
    font-size: .75rem;
    letter-spacing: .3em;
    color: #456;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  /* ---- STATUS BAR ---- */
  .status-bar {
    display: flex;
    gap: 32px;
    margin-bottom: 20px;
    align-items: center;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-label {
    font-size: .6rem;
    letter-spacing: .25em;
    color: #456;
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan);
    transition: transform .15s, color .15s;
  }
  .stat-value.bump {
    transform: scale(1.35);
    color: var(--green);
  }

  /* ---- GRID ---- */
  .grid-wrapper {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    box-shadow: 0 0 40px #00f5ff18, inset 0 0 20px #00f5ff08;
    position: relative;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(16, var(--cell));
    grid-template-rows: repeat(2, var(--cell));
    gap: var(--gap);
  }
  .cell {
    width: var(--cell);
    height: var(--cell);
    background: var(--dim);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: .65rem;
    transition: background .08s, box-shadow .08s;
    position: relative;
    overflow: hidden;
  }
  .cell::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 4px;
    opacity: 0;
    transition: opacity .08s;
  }

  /* Player */
  .cell.player {
    background: #003a4f;
    border: 1.5px solid var(--cyan);
    box-shadow: 0 0 12px var(--cyan), inset 0 0 6px #00f5ff44;
  }
  .cell.player::after {
    background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
    opacity: .3;
  }

  /* Target */
  .cell.target {
    background: #2a1500;
    border: 1.5px solid var(--yellow);
    box-shadow: 0 0 12px var(--yellow), inset 0 0 6px #ffe60044;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px var(--yellow); }
    50%      { box-shadow: 0 0 22px var(--yellow), 0 0 40px #ffe60055; }
  }

  /* Collision */
  .cell.collision {
    background: #1a2f00;
    border: 1.5px solid var(--green);
    box-shadow: 0 0 18px var(--green);
    animation: collide .35s ease-out;
  }
  @keyframes collide {
    0%   { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ---- DIRECTION INDICATOR ---- */
  .direction-ring {
    display: grid;
    grid-template-columns: repeat(3, 40px);
    grid-template-rows: repeat(3, 40px);
    gap: 4px;
    margin-top: 20px;
  }
  .dir-cell {
    background: var(--dim);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: .65rem;
    color: #345;
    letter-spacing: .05em;
    transition: background .12s, color .12s, box-shadow .12s;
  }
  .dir-cell.center {
    background: var(--panel);
    color: #345;
    font-size: .55rem;
    letter-spacing: .1em;
  }
  .dir-cell.active {
    background: #001f2f;
    color: var(--cyan);
    border: 1px solid var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
  }

  /* ---- CONNECTION STATUS ---- */
  .conn-bar {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .7rem;
    letter-spacing: .12em;
    color: #456;
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    transition: background .3s, box-shadow .3s;
  }
  .conn-dot.online {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; }
    50%      { opacity:.4; }
  }

  /* ---- SCORE POP ---- */
  .score-pop {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 30px var(--green);
    pointer-events: none;
    opacity: 0;
    animation: none;
    z-index: 200;
  }
  .score-pop.show {
    animation: popAnim .7s ease-out forwards;
  }
  @keyframes popAnim {
    0%   { opacity:1; transform: translate(-50%,-50%) scale(.8); }
    40%  { opacity:1; transform: translate(-50%,-60%) scale(1.2); }
    100% { opacity:0; transform: translate(-50%,-80%) scale(1); }
  }
</style>
</head>
<body>

<h1>TILT GAME</h1>
<p class="subtitle">ESP8266 &bull; MPU6050 &bull; WebSocket</p>

<div class="status-bar">
  <div class="stat">
    <span class="stat-label">Score</span>
    <span class="stat-value" id="scoreVal">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Directie</span>
    <span class="stat-value" id="dirVal" style="font-size:1rem;letter-spacing:.15em">NEUTRU</span>
  </div>
</div>

<div class="grid-wrapper">
  <div class="grid" id="grid"></div>
</div>

<div class="direction-ring" id="dirRing">
  <div class="dir-cell" id="d-FL">↖</div>
  <div class="dir-cell" id="d-F">↑ FATA</div>
  <div class="dir-cell" id="d-FR">↗</div>
  <div class="dir-cell" id="d-L">← STNGA</div>
  <div class="dir-cell center" id="d-N">•</div>
  <div class="dir-cell" id="d-R">DRPTA →</div>
  <div class="dir-cell" id="d-BL">↙</div>
  <div class="dir-cell" id="d-B">↓ SPATE</div>
  <div class="dir-cell" id="d-BR">↘</div>
</div>

<div class="conn-bar">
  <div class="conn-dot" id="connDot"></div>
  <span id="connLabel">Se conecteaza...</span>
</div>

<div class="score-pop" id="scorePop">+1</div>

<script>
const W = 16, H = 2;
const grid = document.getElementById('grid');

// Build cells
const cells = [];
for (let y = 0; y < H; y++) {
  for (let x = 0; x < W; x++) {
    const c = document.createElement('div');
    c.className = 'cell';
    grid.appendChild(c);
    cells.push(c);
  }
}

function cellAt(x, y) { return cells[y * W + x]; }

let prevScore = 0;

function render(data) {
  // Clear
  cells.forEach(c => c.className = 'cell');

  const isCollision = data.playerX === data.targetX && data.playerY === data.targetY;

  // Target
  if (!isCollision) {
    cellAt(data.targetX, data.targetY).classList.add('target');
  }

  // Player
  const pCell = cellAt(data.playerX, data.playerY);
  pCell.classList.add(isCollision ? 'collision' : 'player');

  // Score
  const sv = document.getElementById('scoreVal');
  if (data.score !== prevScore) {
    prevScore = data.score;
    sv.classList.remove('bump');
    void sv.offsetWidth; // reflow
    sv.classList.add('bump');
    setTimeout(() => sv.classList.remove('bump'), 250);
    // Pop anim
    const pop = document.getElementById('scorePop');
    pop.classList.remove('show');
    void pop.offsetWidth;
    pop.classList.add('show');
  }
  sv.textContent = data.score;
  document.getElementById('dirVal').textContent = data.direction;

  // Direction ring
  const map = {
    'NEUTRU':        'd-N',
    'FATA':          'd-F',
    'SPATE':         'd-B',
    'STANGA':        'd-L',
    'DREAPTA':       'd-R',
    'FATA-STANGA':   'd-FL',
    'FATA-DREAPTA':  'd-FR',
    'SPATE-STANGA':  'd-BL',
    'SPATE-DREAPTA': 'd-BR',
  };
  document.querySelectorAll('.dir-cell').forEach(el => el.classList.remove('active'));
  const activeId = map[data.direction] || 'd-N';
  document.getElementById(activeId).classList.add('active');
}

// WebSocket
const ws = new WebSocket('ws://' + location.hostname + ':81/');
const dot   = document.getElementById('connDot');
const label = document.getElementById('connLabel');

ws.onopen = () => {
  dot.classList.add('online');
  label.textContent = 'Conectat la ' + location.hostname;
};
ws.onclose = () => {
  dot.classList.remove('online');
  label.textContent = 'Deconectat — reincarca pagina';
};
ws.onmessage = (e) => {
  try { render(JSON.parse(e.data)); } catch(_) {}
};
</script>
</body>
</html>

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Viteza de upload și monitor serial (ESP8266 funcționează ideal la 115200)
upload_speed = 115200
monitor_speed = 115200

; Bibliotecile necesare proiectului tău (PlatformIO le va descărca automat)
lib_deps =
    electroniccats/MPU6050 @ ^1.4.1
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    Links2004/WebSockets @ ^2.6.1
    bblanchon/ArduinoJson @ ^6.21.2
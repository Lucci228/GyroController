<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tilt Game</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:     #050a0e;
    --panel:  #0b1520;
    --border: #0ff3;
    --cyan:   #00f5ff;
    --green:  #00ff88;
    --yellow: #ffe600;
    --red:    #ff4060;
    --dim:    #111d27;
    --text:   #c8eaf5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 12px 32px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,245,255,.018) 3px, rgba(0,245,255,.018) 4px
    );
    pointer-events: none; z-index: 100;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.3rem, 4vw, 2.4rem);
    font-weight: 900;
    letter-spacing: .18em;
    color: var(--cyan);
    text-shadow: 0 0 18px var(--cyan), 0 0 40px #00f5ff55;
    margin-bottom: 3px;
    animation: flicker 7s infinite;
  }
  @keyframes flicker {
    0%,94%,100%{opacity:1} 95%{opacity:.6} 96%{opacity:1} 97%{opacity:.5}
  }
  .subtitle {
    font-size: .7rem; letter-spacing: .3em; color: #345;
    text-transform: uppercase; margin-bottom: 14px;
  }

  /* ---- IP CONFIG BOX ---- */
  .ip-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
    background: var(--panel);
    border: 1px solid #0ff2;
    border-radius: 8px;
    padding: 8px 14px;
  }
  .ip-label { font-size: .65rem; letter-spacing: .2em; color: #456; text-transform: uppercase; }
  .ip-bar input {
    background: #050a0e;
    border: 1px solid #0ff3;
    border-radius: 5px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: .85rem;
    padding: 4px 10px;
    width: 150px;
    outline: none;
  }
  .ip-bar input:focus { border-color: var(--cyan); box-shadow: 0 0 8px #00f5ff44; }
  .ip-btn {
    background: #001f2f;
    border: 1px solid var(--cyan);
    border-radius: 5px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: .1em;
    transition: background .15s, box-shadow .15s;
  }
  .ip-btn:hover { background: #003040; box-shadow: 0 0 10px var(--cyan); }

  /* ---- STATUS ---- */
  .status-bar {
    display: flex; gap: 40px; margin-bottom: 16px; align-items: center;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-label { font-size: .58rem; letter-spacing: .25em; color: #456; text-transform: uppercase; }
  .stat-value {
    font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700;
    color: var(--cyan); text-shadow: 0 0 10px var(--cyan);
    transition: transform .15s, color .15s;
  }
  .stat-value.bump { transform: scale(1.4); color: var(--green); }

  /* ---- CANVAS ---- */
  .grid-wrapper {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 0 50px #00f5ff14, inset 0 0 24px #00f5ff07;
  }
  canvas { display: block; image-rendering: pixelated; }

  /* ---- DIRECTION RING ---- */
  .dir-section { display: flex; align-items: center; gap: 24px; margin-top: 18px; }
  .direction-ring {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
  }
  .dir-cell {
    background: var(--dim); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: .6rem; color: #2a3d50; letter-spacing: .04em;
    transition: background .1s, color .1s, box-shadow .1s;
    text-align: center; line-height: 1.2;
  }
  .dir-cell.center { background: var(--panel); color: #243040; font-size: .5rem; }
  .dir-cell.active {
    background: #001f2f; color: var(--cyan);
    border: 1px solid var(--cyan); box-shadow: 0 0 12px var(--cyan);
  }

  /* ---- CONN ---- */
  .conn-bar {
    margin-top: 14px; display: flex; align-items: center; gap: 8px;
    font-size: .68rem; letter-spacing: .1em; color: #456;
  }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); box-shadow: 0 0 6px var(--red);
    transition: background .3s, box-shadow .3s;
  }
  .conn-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* ---- SCORE POP ---- */
  .score-pop {
    position: fixed; top: 45%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900;
    color: var(--green); text-shadow: 0 0 30px var(--green);
    pointer-events: none; opacity: 0; z-index: 200;
  }
  .score-pop.show { animation: popAnim .7s ease-out forwards; }
  @keyframes popAnim {
    0%   { opacity:1; transform:translate(-50%,-50%) scale(.7); }
    40%  { opacity:1; transform:translate(-50%,-62%) scale(1.25); }
    100% { opacity:0; transform:translate(-50%,-85%) scale(1); }
  }
</style>
</head>
<body>

<h1>TILT GAME</h1>
<p class="subtitle">ESP8266 &bull; MPU6050 &bull; 32&times;32</p>

<!-- IP Configuration -->
<div class="ip-bar">
  <span class="ip-label">ESP IP</span>
  <input type="text" id="espIp" placeholder="192.168.1.XX" />
  <button class="ip-btn" onclick="connect()">CONECTARE</button>
</div>

<div class="status-bar">
  <div class="stat">
    <span class="stat-label">Score</span>
    <span class="stat-value" id="scoreVal">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Directie</span>
    <span class="stat-value" id="dirVal" style="font-size:.95rem;letter-spacing:.1em">NEUTRU</span>
  </div>
</div>

<div class="grid-wrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<div class="dir-section">
  <div class="direction-ring">
    <div class="dir-cell" id="d-FL">↖</div>
    <div class="dir-cell" id="d-F">↑<br>FATA</div>
    <div class="dir-cell" id="d-FR">↗</div>
    <div class="dir-cell" id="d-L">←<br>STG</div>
    <div class="dir-cell center" id="d-N">•</div>
    <div class="dir-cell" id="d-R">DRP<br>→</div>
    <div class="dir-cell" id="d-BL">↙</div>
    <div class="dir-cell" id="d-B">SPATE<br>↓</div>
    <div class="dir-cell" id="d-BR">↘</div>
  </div>
</div>

<div class="conn-bar">
  <div class="conn-dot" id="connDot"></div>
  <span id="connLabel">Introdu IP-ul ESP si apasa CONECTARE</span>
</div>

<div class="score-pop" id="scorePop">+1</div>

<script>
// ---- Canvas setup ----
const W = 32, H = 32;
const CELL = 18, GAP = 2, STEP = CELL + GAP;

const canvas = document.getElementById('gameCanvas');
canvas.width  = W * STEP - GAP;
canvas.height = H * STEP - GAP;
const ctx = canvas.getContext('2d');

const TRAIL_LEN = 8;
const trail = [];
let prevScore = 0;
let collisionFlash = 0;
let prevPx = -1, prevPy = -1;
let state = { playerX: 15, playerY: 15, targetX: 25, targetY: 5, score: 0, direction: 'NEUTRU' };

// ---- Render loop ----
function renderCanvas() {
  ctx.fillStyle = '#0b1520';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x++)
    for (let y = 0; y < H; y++)
      ctx.strokeRect(x * STEP + .5, y * STEP + .5, CELL - 1, CELL - 1);

  const d = state;
  const isCollision = d.playerX === d.targetX && d.playerY === d.targetY;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const a = (i / TRAIL_LEN) * 0.18;
    ctx.fillStyle = `rgba(0,245,255,${a})`;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.roundRect(trail[i].x * STEP, trail[i].y * STEP, CELL, CELL, 3);
    ctx.fill();
  }

  // Target
  if (!isCollision) {
    const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 350);
    ctx.shadowColor = `rgba(255,230,0,${pulse * 0.8})`;
    ctx.shadowBlur = 16 + pulse * 10;
    ctx.fillStyle = '#1a0f00';
    ctx.beginPath();
    ctx.roundRect(d.targetX * STEP, d.targetY * STEP, CELL, CELL, 3);
    ctx.fill();
    ctx.fillStyle = '#ffe600';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(d.targetX * STEP + CELL/2, d.targetY * STEP + CELL/2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Player
  if (isCollision || collisionFlash > 0) {
    collisionFlash = Math.max(0, collisionFlash - 1);
    ctx.shadowColor = 'rgba(0,255,136,0.9)'; ctx.shadowBlur = 24;
    ctx.fillStyle = '#152800';
  } else {
    ctx.shadowColor = 'rgba(0,245,255,0.85)'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#002535';
  }
  ctx.beginPath();
  ctx.roundRect(d.playerX * STEP, d.playerY * STEP, CELL, CELL, 3);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Crosshair
  if (!isCollision && collisionFlash === 0) {
    ctx.strokeStyle = '#00f5ff'; ctx.lineWidth = 1;
    ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 4;
    const px = d.playerX * STEP, py = d.playerY * STEP;
    ctx.beginPath();
    ctx.moveTo(px + CELL/2, py + 3); ctx.lineTo(px + CELL/2, py + CELL - 3);
    ctx.moveTo(px + 3, py + CELL/2); ctx.lineTo(px + CELL - 3, py + CELL/2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  requestAnimationFrame(renderCanvas);
}
requestAnimationFrame(renderCanvas);

// ---- Data handler ----
function applyData(data) {
  if (data.playerX !== prevPx || data.playerY !== prevPy) {
    if (prevPx >= 0) {
      trail.push({ x: prevPx, y: prevPy });
      if (trail.length > TRAIL_LEN) trail.shift();
    }
    prevPx = data.playerX; prevPy = data.playerY;
  }
  if (data.playerX === data.targetX && data.playerY === data.targetY) collisionFlash = 8;
  state = data;

  const sv = document.getElementById('scoreVal');
  if (data.score !== prevScore) {
    prevScore = data.score;
    sv.classList.remove('bump'); void sv.offsetWidth; sv.classList.add('bump');
    setTimeout(() => sv.classList.remove('bump'), 260);
    const pop = document.getElementById('scorePop');
    pop.classList.remove('show'); void pop.offsetWidth; pop.classList.add('show');
  }
  sv.textContent = data.score;
  document.getElementById('dirVal').textContent = data.direction;

  const map = {
    'NEUTRU':'d-N','FATA':'d-F','SPATE':'d-B','STANGA':'d-L','DREAPTA':'d-R',
    'FATA-STANGA':'d-FL','FATA-DREAPTA':'d-FR','SPATE-STANGA':'d-BL','SPATE-DREAPTA':'d-BR'
  };
  document.querySelectorAll('.dir-cell').forEach(el => el.classList.remove('active'));
  document.getElementById(map[data.direction] || 'd-N').classList.add('active');
}

// ---- WebSocket ----
let ws = null;
const dot   = document.getElementById('connDot');
const label = document.getElementById('connLabel');

// Incarca IP salvat din localStorage
const savedIp = localStorage.getItem('esp_ip');
if (savedIp) document.getElementById('espIp').value = savedIp;

function connect() {
  const ip = document.getElementById('espIp').value.trim();
  if (!ip) { label.textContent = 'Introdu un IP valid!'; return; }

  // Salveaza IP pentru data viitoare
  localStorage.setItem('esp_ip', ip);

  if (ws) { ws.close(); ws = null; }

  label.textContent = 'Se conecteaza la ' + ip + '...';
  dot.classList.remove('online');

  ws = new WebSocket('ws://' + ip + ':81/');
  ws.onopen    = () => { dot.classList.add('online'); label.textContent = 'Conectat la ' + ip; };
  ws.onclose   = () => { dot.classList.remove('online'); label.textContent = 'Deconectat. Reapasa CONECTARE.'; };
  ws.onerror   = () => { label.textContent = 'Eroare conectare. Verifica IP-ul.'; };
  ws.onmessage = (e) => { try { applyData(JSON.parse(e.data)); } catch(_) {} };
}

// Auto-conectare daca avem IP salvat
if (savedIp) connect();
</script>
</body>
</html>
